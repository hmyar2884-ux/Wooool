<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء الاسم الميداني - حرس الحدود</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 30px;
            margin: 0;
        }
        .main-container {
            width: 95%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            color: #4a4a4a;
            font-size: 22px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: right;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f8f8f8;
            font-size: 15px;
            box-sizing: border-box;
            color: #333;
            text-align: center;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 8px;
            color: #888;
            font-size: 13px;
        }
        .checkbox-container input {
            margin-left: 8px;
        }
        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 20px 0;
        }
        .result-label {
            font-weight: bold;
            text-align: right;
            display: block;
            margin-bottom: 10px;
        }
        #resultDisplay {
            width: 100%;
            padding: 20px;
            background-color: #f1f1f1;
            border-radius: 10px;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 15px;
            box-sizing: border-box;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
        }
        .btn-copy {
            width: 100%;
            padding: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>إنشاء الاسم الميداني</h1>

    <div class="form-group">
        <label>الكود العسكري (مثال: 220):</label>
        <input type="text" id="mCode" placeholder="أدخل الكود">
    </div>

    <div class="form-group">
        <label>اختيار الحرف الأساسي:</label>
        <select id="charBase" onchange="generate()">
            <option value="R">R</option><option value="E">E</option><option value="G">G</option>
            <option value="P">P</option><option value="H">H</option><option value="M">M</option>
            <option value="S">S</option><option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option><option value="F">F</option>
            <option value="J">J</option><option value="K">K</option><option value="L">L</option>
            <option value="N">N</option><option value="O">O</option><option value="T">T</option>
            <option value="U">U</option><option value="V">V</option><option value="W">W</option>
            <option value="X">X</option><option value="Y">Y</option><option value="Z">Z</option>
        </select>
    </div>

    <div class="form-group">
        <label>اختيار المسمى الميداني:</label>
        <select id="callSign" onchange="generate()">
            <option value="">--- اختر المسمى ---</option>
            <option value="العمليات">العمليات</option>
            <option value="نائب العمليات">نائب العمليات</option>
            <option value="مجد">مجد</option>
            <option value="ردع">ردع</option>
            <option value="شهاب">شهاب</option>
            <option value="سيف">سيف</option>
            <option value="رمح">رمح</option>
            <option value="حد">حد</option>
            <option value="سلاح">سلاح</option>
            <option value="مراقب جوي">مراقب جوي</option>
            <option value="مراقب ارضي">مراقب ارضي</option>
            <option value="سند">سند</option>
            <option value="غفوة">غفوة</option>
            <option value="تعديل / تزويد / شراء تأمين صحي / استلام ترقية">إجراء إداري</option>
        </select>
    </div>

    <div class="form-group">
        <label>رقم المسمى (1-20):</label>
        <select id="callNum" onchange="generate()">
            </select>
    </div>

    <div class="checkbox-container">
        <span>تفعيل نظام 4 أرقام (0000)</span>
        <input type="checkbox" id="fourDigits">
    </div>

    <hr>

    <span class="result-label">الاسم الميداني الناتج:</span>
    <div id="resultDisplay">يرجى اختيار الإعدادات</div>

    <button class="btn-copy" onclick="copyText()">
        <span>🖨️</span> نسخ الاسم الميداني
    </button>
</div>

<script>
    // تعبئة أرقام المسمى من 1 إلى 20
    const callNumSelect = document.getElementById('callNum');
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i;
        callNumSelect.appendChild(opt);
    }

    const mCodeInput = document.getElementById('mCode');
    const callSignSelect = document.getElementById('callSign');
    const charBaseSelect = document.getElementById('charBase');
    const fourDigitsCheck = document.getElementById('fourDigits');
    const resultDisplay = document.getElementById('resultDisplay');

    function generate() {
        let codeVal = mCodeInput.value.trim() || "000";
        const callVal = callSignSelect.value;
        const charVal = charBaseSelect.value;
        const numVal = callNumSelect.value;

        if (!callVal) {
            resultDisplay.innerText = "يرجى اختيار المسمى";
            return;
        }

        // تحويل الكود العسكري لنظام 4 خانات إذا تم التفعيل
        if (fourDigitsCheck.checked) {
            codeVal = codeVal.padStart(4, '0');
        }

        // التنسيق المطلوب: CD | E-220 | حد 2
        // ملاحظة: CD كلمة ثابتة في التقرير أو مسمى؟ وضعتها كبادئة ثابتة كما في مثالك
        resultDisplay.innerText = `CD | ${charVal}-${codeVal} | ${callVal} ${numVal}`;
    }

    mCodeInput.addEventListener('input', generate);
    fourDigitsCheck.addEventListener('change', generate);

    function copyText() {
        const text = resultDisplay.innerText;
        if (text === "يرجى اختيار المسمى") return;
        navigator.clipboard.writeText(text).then(() => {
            alert("تم النسخ: " + text);
        });
    }
</script>

</body>
</html>
