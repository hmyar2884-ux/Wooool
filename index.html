<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء الاسم الميداني - حرس الحدود</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f1f3f5;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            background-color: #fff;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
        .divider {
            height: 1px;
            background-color: #eee;
            margin: 25px 0;
        }
        .result-box {
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 25px;
        }
        .btn-copy {
            background-color: #3b82f6;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-copy:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>إنشاء الاسم الميداني</h1>

    <div class="form-group">
        <label>الرقم الميداني:</label>
        <input type="text" id="pNum" placeholder="أدخل الرقم">
        <div class="checkbox-group">
            <input type="checkbox" id="fourDigits">
            <span>تفعيل نظام 4 أرقام (0000)</span>
        </div>
    </div>

    <div class="form-group">
        <label>اختيار المسمى الميداني:</label>
        <select id="callSign" onchange="updateResult()">
            <option value="">--- اختر المسمى ---</option>
            <option value="مجد">مجد</option>
            <option value="سيف">سيف</option>
            <option value="حرس">حرس</option>
            <option value="حد">حد</option>
            <option value="ردع">ردع</option>
            <option value="شهاب">شهاب</option>
            <option value="رمح">رمح</option>
            <option value="سلاح">سلاح</option>
            <option value="غفوة">غفوة</option>
            <option value="تعديل و تزويد">تعديل و تزويد</option>
        </select>
    </div>

    <div class="form-group">
        <label>اختيار الحرف الأساسي (افتراضي: R):</label>
        <select id="charBase">
            <option value="R">R</option>
            <option value="E">E</option>
            <option value="G">G</option>
            <option value="P">P</option>
            <option value="H">H</option>
        </select>
    </div>

    <div class="divider"></div>

    <label style="text-align: right;">الاسم الميداني الناتج:</label>
    <div class="result-box" id="resultDisplay">يرجى اختيار المسمى</div>

    <button class="btn-copy" onclick="copyResult()">
        <span>🖨️</span> نسخ الاسم الميداني
    </button>
</div>

<script>
    const pNumInput = document.getElementById('pNum');
    const callSignSelect = document.getElementById('callSign');
    const charBaseSelect = document.getElementById('charBase');
    const fourDigitsCheck = document.getElementById('fourDigits');
    const resultDisplay = document.getElementById('resultDisplay');

    function updateResult() {
        let num = pNumInput.value.trim() || "0";
        const call = callSignSelect.value;
        const char = charBaseSelect.value;

        if (!call) {
            resultDisplay.innerText = "يرجى اختيار المسمى";
            return;
        }

        // تحويل الرقم لنظام 4 خانات إذا تم التفعيل
        if (fourDigitsCheck.checked) {
            num = num.padStart(4, '0');
        }

        // الحالات الإدارية التي لا تتطلب رقم
        const noNumTypes = ["غفوة", "تعديل و تزويد"];
        
        if (noNumTypes.includes(call)) {
            resultDisplay.innerText = `${call} : ${char}`;
        } else {
            resultDisplay.innerText = `${call} ${num} : ${char}`;
        }
    }

    // تحديث تلقائي عند الكتابة أو التغيير
    pNumInput.addEventListener('input', updateResult);
    fourDigitsCheck.addEventListener('change', updateResult);
    charBaseSelect.addEventListener('change', updateResult);

    function copyResult() {
        const text = resultDisplay.innerText;
        if (text === "يرجى اختيار المسمى") return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("تم نسخ الاسم الميداني: " + text);
        });
    }
</script>

</body>
</html>
