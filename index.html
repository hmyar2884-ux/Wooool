<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء الاسم الميداني</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 30px auto;
  width: 330px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #007bff;
  color: white;
  border: none;
  font-weight: bold;
}

button:hover {
  background: #0056b3;
}

.result {
  background: #eee;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
  <h2>إنشاء الاسم الميداني</h2>

  <!-- الرقم -->
  <input type="number" id="number" placeholder="أدخل الرقم">

  <label>
    <input type="checkbox" id="fourDigits"> تفعيل 4 أرقام (0000)
  </label>

  <!-- المكان -->
  <select id="place">
    <option value="">--- اختر المكان ---</option>
    <option value="حد">حد</option>
    <option value="رمح">رمح</option>
    <option value="سيف">سيف</option>
    <option value="سلاح">سلاح</option>
    <option value="ردع">ردع</option>
    <option value="غفوة">غفوة</option>
  </select>

  <!-- المهمة -->
  <select id="task">
    <option value="">--- اختر المهمة ---</option>
    <option value="تعديل">تعديل</option>
    <option value="تزويد">تزويد</option>
    <option value="شراء تأمين صحي">شراء تأمين صحي</option>
  </select>

  <!-- الحرف -->
  <select id="letter">
    <option value="E">E</option>
    <option value="M">M</option>
    <option value="S">S</option>
    <option value="G">G</option>
    <option value="P">P</option>
    <option value="H">H</option>
    <option value="R">R</option>
  </select>

  <button onclick="generate()">إنشاء الاسم</button>

  <div class="result" id="result">الاسم يطلع هنا</div>

  <button onclick="copyText()">نسخ الاسم 📋</button>
</div>

<script>
function generate() {
  let number = document.getElementById("number").value;
  let place = document.getElementById("place").value;
  let task = document.getElementById("task").value;
  let letter = document.getElementById("letter").value;
  let fourDigits = document.getElementById("fourDigits").checked;

  if (!number || !place || !task) {
    alert("عبي كل البيانات");
    return;
  }

  // تحويل إلى 4 أرقام
  if (fourDigits) {
    number = number.padStart(4, '0');
  }

  let name = `${letter}-${place}-${task}-${number}`;
  document.getElementById("result").innerText = name;
}

function copyText() {
  let text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("تم النسخ ✅");
}
</script>

</body>
</html>
