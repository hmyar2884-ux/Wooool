<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء الاسم الميداني - حرس الحدود</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; display: flex; justify-content: center; padding-top: 30px; margin: 0; }
        .main-container { width: 95%; max-width: 450px; text-align: center; }
        h1 { color: #4a4a4a; font-size: 22px; margin-bottom: 25px; }
        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: #666; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background-color: #f8f8f8; font-size: 15px; text-align: center; box-sizing: border-box; outline: none; }
        #resultDisplay { width: 100%; padding: 20px; background-color: #f1f1f1; border-radius: 10px; font-size: 19px; font-weight: bold; margin: 20px 0; color: #2c3e50; min-height: 60px; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; direction: ltr; }
        .btn-copy { width: 100%; padding: 15px; background-color: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-copy:active { background-color: #2563eb; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="main-container">
    <h1>إنشاء الاسم الميداني</h1>

    <div class="form-group">
        <label>الكود العسكري (أرقام فقط):</label>
        <input type="text" id="mCode" placeholder="مثال: 220" oninput="generate()">
    </div>

    <div class="form-group">
        <label>اختيار الحرف (المحدد فقط):</label>
        <select id="charBase" onchange="generate()">
            <option value="R">R</option>
            <option value="E">E</option>
            <option value="G">G</option>
            <option value="P">P</option>
            <option value="H">H</option>
            <option value="M">M</option>
            <option value="S">S</option>
        </select>
    </div>

    <div class="form-group">
        <label>المسمى الميداني:</label>
        <select id="callSign" onchange="generate()">
            <option value="العمليات">العمليات</option>
            <option value="نائب العمليات">نائب العمليات</option>
            <option value="مجد">مجد</option>
            <option value="ردع">ردع</option>
            <option value="شهاب">شهاب</option>
            <option value="سيف">سيف</option>
            <option value="رمح">رمح</option>
            <option value="حد">حد</option>
            <option value="سلاح">سلاح</option>
            <option value="مراقب جوي">مراقب جوي</option>
            <option value="مراقب ارضي">مراقب ارضي</option>
            <option value="سند">سند</option>
            <option value="غفوة">غفوة</option>
            <option value="تعديل / تزويد">تعديل / تزويد / شراء تأمين صحي / استلام ترقية</option>
        </select>
    </div>

    <div class="form-group">
        <label>الرقم الميداني (1-20):</label>
        <select id="callNum" onchange="generate()">
            <script>
                for(let i=1; i<=20; i++) document.write(`<option value="${i}">${i}</option>`);
            </script>
        </select>
    </div>

    <div id="resultDisplay">CD | R-000 | العمليات 1</div>

    <button class="btn-copy" onclick="copyText()">🖨️ نسخ الاسم الميداني</button>
</div>

<script>
    function generate() {
        const codeInput = document.getElementById('mCode').value || "000";
        const char = document.getElementById('charBase').value;
        const sign = document.getElementById('callSign').value;
        const num = document.getElementById('callNum').value;
        
        // التنسيق المطلوب: CD | الحرف-الكود | المسمى الرقم
        document.getElementById('resultDisplay').innerText = `CD | ${char}-${codeInput} | ${sign} ${num}`;
    }
    
    function copyText() {
        const text = document.getElementById('resultDisplay').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("تم النسخ بنجاح!");
        });
    }
    
    window.onload = generate;
</script>

</body>
</html>
