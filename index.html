<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاسم الميداني</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 30px auto;
  width: 340px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #0d6efd;
  color: white;
  font-weight: bold;
  border: none;
}

.result {
  background: #eee;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>إنشاء الاسم الميداني</h2>

  <!-- الرقم -->
  <input type="number" id="number" placeholder="أدخل الرقم">

  <label>
    <input type="checkbox" id="fourDigits"> 4 أرقام (0000)
  </label>

  <!-- القسم -->
  <select id="unit" onchange="showUnitNumber()">
    <option value="">--- اختر القسم ---</option>
    <option>العمليات</option>
    <option>نائب العمليات</option>
    <option>مجد</option>
    <option>ردع</option>
    <option>شهاب</option>
    <option>سيف</option>
    <option>رمح</option>
    <option>حد</option>
    <option>سلاح</option>
    <option>سند</option>
    <option>غفوة</option>
  </select>

  <!-- رقم القسم -->
  <div id="unitNumberBox" style="display:none;">
    <select id="unitNumber">
      <option value="">--- رقم القسم ---</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>

  <!-- الدور -->
  <select id="role">
    <option value="">--- نوع المهمة ---</option>
    <option>مراقب جوي</option>
    <option>مراقب ارضي</option>
  </select>

  <!-- المهمة -->
  <select id="task">
    <option value="">--- اختر المهمة ---</option>
    <option>تعديل</option>
    <option>تزويد</option>
    <option>شراء تأمين صحي</option>
    <option>استلام ترقية</option>
  </select>

  <!-- الحرف -->
  <select id="letter">
    <option>E</option>
    <option>M</option>
    <option>S</option>
    <option>G</option>
    <option>P</option>
    <option>H</option>
    <option>R</option>
  </select>

  <button onclick="generate()">إنشاء الاسم</button>

  <div class="result" id="result">الاسم يطلع هنا</div>

  <button onclick="copyText()">نسخ 📋</button>
</div>

<script>
function showUnitNumber() {
  let unit = document.getElementById("unit").value;
  let box = document.getElementById("unitNumberBox");

  if (unit) {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

function generate() {
  let number = document.getElementById("number").value;
  let unit = document.getElementById("unit").value;
  let unitNumber = document.getElementById("unitNumber").value;
  let role = document.getElementById("role").value;
  let task = document.getElementById("task").value;
  let letter = document.getElementById("letter").value;
  let fourDigits = document.getElementById("fourDigits").checked;

  if (!number || !unit || !task) {
    alert("عبي البيانات الأساسية");
    return;
  }

  if (fourDigits) {
    number = number.padStart(4, '0');
  }

  let fullUnit = unit;
  if (unitNumber) {
    fullUnit += " " + unitNumber;
  }

  let name = `${letter}-${fullUnit}-${role}-${task}-${number}`;
  document.getElementById("result").innerText = name;
}

function copyText() {
  let text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("تم النسخ ✅");
}
</script>

</body>
</html>
