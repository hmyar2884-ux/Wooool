<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسمى ميداني | عمليات حرس الحدود</title>
    <style>
        /* إضافة الخلفية هنا */
        body { 
            font-family: 'Tahoma', sans-serif; 
            background-color: #0d1117; 
            /* رابط شعار حرس الحدود، يمكنك استبداله برابط مباشر آخر إذا أردت */
            background-image: url('https://i.ibb.co/X8Y5k7H/border-guard-logo.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        /* إضافة تأثير زجاجي (Blur) خلف البطاقة لتبدو أوضح مع الخلفية */
        .card { 
            background: rgba(22, 27, 34, 0.9); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 12px; 
            border: 2px solid #30363d; 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        /* العنوان الجديد باللون الأخضر المميز */
        h2 { 
            color: #4caf50; 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #238636; 
            padding-bottom: 12px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .input-group { 
            margin-bottom: 15px; 
            text-align: right; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 1rem; 
            color: #b0bec5; 
            font-weight: bold; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid #4caf50; /* حدود خضراء للمدخلات */
            background: rgba(13, 17, 23, 0.8); 
            color: white; 
            font-size: 1rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.2s;
        }

        select:focus, input:focus { 
            border-color: #81c784; 
            box-shadow: 0 0 8px rgba(129, 199, 132, 0.5);
        }

        .row { 
            display: flex; 
            gap: 15px; 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: #238636; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem; 
            margin-top: 20px; 
            transition: 0.3s; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        button:hover { 
            background-color: #2ea043; 
            transform: translateY(-3px); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }

        #outputArea { 
            margin-top: 30px; 
            display: none; 
            animation: fadeIn 0.5s;
        }

        #result { 
            background: rgba(1, 4, 9, 0.9); 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px dashed #4caf50; 
            color: #79c0ff; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.3rem; 
            word-break: break-all; 
            margin-bottom: 20px; 
            text-align: center; 
            font-weight: bold; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .copy-btn { 
            background-color: #4caf50; /* زر نسخ أخضر */
            font-size: 1rem; 
            padding: 12px;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>⚔️ مسمى ميداني ⚔️</h2>
    
    <div class="input-group">
        <label>الرتبة العسكرية</label>
        <select id="pRank">
            <option value="R-001">قائد حرس الحدود (R-001)</option>
            <option value="R-002">نائب قائد حرس الحدود (R-002)</option>
            <option value="لواء">لواء</option>
            <option value="عميد">عميد</option>
            <option value="عقيد">عقيد</option>
            <option value="مقدم">مقدم</option>
            <option value="رائد">رائد</option>
            <option value="نقيب">نقيب</option>
            <option value="ملازم أول">ملازم أول</option>
            <option value="ملازم">ملازم</option>
            <option value="رئيس رقباء">رئيس رقباء</option>
            <option value="رقيب أول">رقيب أول</option>
            <option value="رقيب">رقيب</option>
            <option value="وكيل رقيب">وكيل رقيب</option>
            <option value="عريف">عريف</option>
            <option value="جندي أول">جندي أول</option>
            <option value="جندي">جندي</option>
        </select>
    </div>

    <div class="input-group">
        <label>المسمى الميداني / الإجراء</label>
        <select id="callSign">
            <optgroup label="المسميات الميدانية">
                <option value="مجد">مجد</option>
                <option value="ردع">ردع</option>
                <option value="شهاب">شهاب</option>
                <option value="سيف">سيف</option>
                <option value="رمح">رمح</option>
                <option value="حرس">حرس</option>
                <option value="حد">حد</option>
                <option value="سلاح">سلاح</option>
                <option value="شاهين">شاهين</option>
                <option value="ساحل">ساحل</option>
                <option value="سجن">سجن</option>
                <option value="حزم">حزم</option>
                <option value="خاصة 1">خاصة 1</option>
            </optgroup>
            <optgroup label="الحالة والإجراءات">
                <option value="غفوة">غفوة</option>
                <option value="تعديل و تزويد">تعديل و تزويد</option>
                <option value="تأمين صحي">تأمين صحي</option>
                <option value="شراء مركبة">شراء مركبة</option>
                <option value="استلام ترقية">استلام ترقية</option>
            </optgroup>
        </select>
    </div>

    <div class="row">
        <div style="flex: 1;">
            <label>الرقم (إن وجد)</label>
            <input type="text" id="pNum" value="1">
        </div>
        <div style="flex: 2;">
            <label>الكود العسكري</label>
            <input type="text" id="mCode" placeholder="R-426">
        </div>
    </div>

    <button onclick="generate()">توليد السطر للتقرير</button>

    <div id="outputArea">
        <div id="result"></div>
        <button class="copy-btn" onclick="copy()">نسخ السطر</button>
    </div>
</div>

<script>
    function generate() {
        const rank = document.getElementById('pRank').value;
        const call = document.getElementById('callSign').value;
        const num = document.getElementById('pNum').value;
        const code = document.getElementById('mCode').value || "R-000";
        
        // المسميات اللي ما تحتاج رقم جنبها
        const noNumTypes = ["غفوة", "تعديل و تزويد", "تأمين صحي", "شراء مركبة", "استلام ترقية"];
        
        let finalText = "";
        if (noNumTypes.includes(call)) {
            finalText = `${call} : ${code} (${rank})`;
        } else {
            finalText = `${call} ${num} : ${code} (${rank})`;
        }
        
        document.getElementById('result').innerText = finalText;
        document.getElementById('outputArea').style.display = 'block';
    }

    function copy() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text);
        alert("تم النسخ بنجاح!");
    }
</script>

</body>
</html>
